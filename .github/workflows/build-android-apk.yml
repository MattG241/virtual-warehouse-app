name: Build Android APK

# Builds the Virtual Warehouse PWA as a Trusted Web Activity (TWA)
# Android APK using Bubblewrap. Trigger manually from the Actions tab.
#
# What you get:
#   • app-release-unsigned.apk + app-release-bundle.aab in artifacts
#   • If you upload a keystore as a repo secret (KEYSTORE_BASE64,
#     KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD), it'll also produce
#     a signed APK ready to sideload or upload to Play.
#
# First-time setup:
#   1. Edit twa-manifest.json — change `host` and `*Url` fields to the
#      Railway domain (or your custom domain) where the PWA is served.
#   2. Run this workflow once to get the SHA-256 fingerprint of the
#      signing key (printed in the log under "assetlinks").
#   3. Host an /.well-known/assetlinks.json file on that domain with
#      the fingerprint — the TWA needs it to trust your origin.
#   4. Re-run the workflow to get the final APK.

on:
  workflow_dispatch:
    inputs:
      release_track:
        description: 'unsigned (no keystore) or signed'
        required: true
        default: 'unsigned'
        type: choice
        options:
          - unsigned
          - signed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Restore keystore (if signing)
        if: ${{ inputs.release_track == 'signed' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is empty — cannot sign."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android.keystore

      - name: Initialize project from twa-manifest.json
        run: |
          bubblewrap init --manifest=twa-manifest.json --skipPwaValidation || true

      - name: Build TWA
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "${{ inputs.release_track }}" = "signed" ]; then
            bubblewrap build \
              --skipPwaValidation \
              --signingKeyPath=./android.keystore \
              --signingKeyAlias="$KEY_ALIAS" \
              --signingKeyPassword="$KEY_PASSWORD" \
              --keystorePassword="$KEYSTORE_PASSWORD"
          else
            bubblewrap build --skipPwaValidation || true
          fi

      - name: Print assetlinks info
        if: always()
        run: |
          echo ""
          echo "==========================================="
          echo "Host this file at https://YOUR_DOMAIN/.well-known/assetlinks.json"
          echo "to make the TWA trust your origin:"
          echo "==========================================="
          [ -f assetlinks.json ] && cat assetlinks.json || echo "(assetlinks.json not generated this run)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ inputs.release_track }}
          retention-days: 7
          path: |
            *.apk
            *.aab
            assetlinks.json
            twa-manifest.json
